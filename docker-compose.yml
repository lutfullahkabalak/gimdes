services:
  backend:
    build:
      context: ./backend
    ports:
      - "1301:8080"
    environment:
      ADDR: ":8080"
      # İsteğe bağlı: yukarı akış GİMDES tabanı (boşsa uygulama varsayılanını kullanır)
      # GIMDES_BASE_URL: "https://..."
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: http://localhost:1301
    ports:
      - "1300:3000"
    depends_on:
      - backend
    restart: unless-stopped
